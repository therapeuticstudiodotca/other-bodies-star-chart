const W = 900, H = 640;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');
const sky = document.getElementById('sky');
const tooltip = document.getElementById('tooltip');
let allStars = [];
let pan = {x:0, y:0}, zoom = 1, dragging = false, lastPos = null;

function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}

function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function placeStars() {
  allStars = [];
  constellations.forEach((con, ci) => {
    const rand = seededRand(ci * 1337 + 7);
    con.starPositions = con.stars.map((star, si) => {
      const angle = (si / con.stars.length) * Math.PI * 2 + ci * 0.9;
      const dist = 38 + rand() * 52;
      const sx = con.cx * W + Math.cos(angle) * dist + (rand() - 0.5) * 18;
      const sy = con.cy * H + Math.sin(angle) * dist + (rand() - 0.5) * 18;
      const obj = { x: sx, y: sy, star, con, ci };
      allStars.push(obj);
      return obj;
    });
  });
}

function drawBackground() {
  ctx.fillStyle = '#070712';
  ctx.fillRect(0, 0, W, H);
  const rand = seededRand(99);
  for (let i = 0; i < 320; i++) {
    const x = rand() * W, y = rand() * H;
    const a = 0.15 + rand() * 0.45, sz = 0.3 + rand() * 0.9;
    ctx.beginPath(); ctx.arc(x, y, sz, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
  }
}

function draw(hovered) {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  ctx.save();
  ctx.translate(pan.x * zoom, pan.y * zoom);
  ctx.scale(zoom, zoom);

  constellations.forEach(con => {
    if (!con.starPositions || con.starPositions.length < 2) return;
    const rgb = hexToRgb(con.color);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.22)`;
    ctx.lineWidth = 0.8; ctx.setLineDash([3, 6]);
    ctx.beginPath();
    con.starPositions.forEach((sp, i) => { i === 0 ? ctx.moveTo(sp.x, sp.y) : ctx.lineTo(sp.x, sp.y); });
    ctx.closePath(); ctx.stroke(); ctx.setLineDash([]);
    ctx.font = '500 9.5px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.6)`;
    ctx.fillText(con.name.toUpperCase(), con.cx * W, con.cy * H - 62);
  });

  allStars.forEach(sp => {
    const isHov = hovered === sp;
    const rgb = hexToRgb(sp.con.color);
    const r = sp.star.r;
    if (isHov) {
      ctx.beginPath(); ctx.arc(sp.x, sp.y, r + 10, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`; ctx.fill();
      ctx.beginPath(); ctx.arc(sp.x, sp.y, r + 5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`; ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(sp.x, sp.y, r + 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.18)`; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(sp.x - r * 0.35, sp.y - r * 0.35, 0, sp.x, sp.y, r);
    grad.addColorStop(0, `rgba(255,255,255,1)`);
    grad.addColorStop(0.35, `rgba(${rgb.r},${rgb.g},${rgb.b},1)`);
    grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`);
    ctx.fillStyle = grad; ctx.fill();
    ctx.font = `${isHov ? '500' : '400'} ${isHov ? 11.5 : 10.5}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = isHov ? `rgba(${rgb.r},${rgb.g},${rgb.b},1)` : `rgba(${rgb.r},${rgb.g},${rgb.b},0.88)`;
    ctx.fillText(sp.star.name, sp.x, sp.y + r + 14);
  });

  ctx.restore();
}

function getHovered(mx, my) {
  const wx = mx / zoom - pan.x, wy = my / zoom - pan.y;
  for (let i = allStars.length - 1; i >= 0; i--) {
    const sp = allStars[i];
    const dx = wx - sp.x, dy = wy - sp.y;
    if (Math.sqrt(dx * dx + dy * dy) < sp.star.r + 10) return sp;
  }
  return null;
}

let animFrame;
function render(hovered) {
  cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(() => draw(hovered));
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
  if (dragging && lastPos) {
    pan.x += (mx - lastPos.x) / zoom; pan.y += (my - lastPos.y) / zoom;
    lastPos = { x: mx, y: my }; tooltip.style.opacity = 0; render(null); return;
  }
  const hov = getHovered(mx, my);
  canvas.style.cursor = hov ? 'pointer' : 'grab';
  render(hov);
  if (hov) {
    document.getElementById('tt-name').textContent = `${hov.star.name} — ${hov.star.body}`;
    document.getElementById('tt-body').textContent = hov.star.prompt;
    const skyRect = sky.getBoundingClientRect();
    tooltip.style.left = Math.min(e.clientX - skyRect.left + 14, sky.offsetWidth - 270) + 'px';
    tooltip.style.top = Math.min(e.clientY - skyRect.top + 14, sky.offsetHeight - 120) + 'px';
    tooltip.style.opacity = 1;
  } else { tooltip.style.opacity = 0; }
});

canvas.addEventListener('mousedown', e => {
  dragging = true;
  const rect = canvas.getBoundingClientRect();
  lastPos = { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) };
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mouseup', () => { dragging = false; lastPos = null; canvas.style.cursor = 'grab'; });
canvas.addEventListener('mouseleave', () => { dragging = false; lastPos = null; tooltip.style.opacity = 0; render(null); });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width), my = (e.clientY - rect.top) * (H / rect.height);
  const wx = mx / zoom - pan.x, wy = my / zoom - pan.y;
  zoom = Math.max(0.5, Math.min(5, zoom * (e.deltaY < 0 ? 1.12 : 0.9)));
  pan.x = mx / zoom - wx; pan.y = my / zoom - wy;
  render(null);
}, { passive: false });

const legend = document.getElementById('legend');
constellations.forEach(con => {
  const item = document.createElement('div');
  item.className = 'leg-item';
  item.innerHTML = `<div class="leg-dot" style="background:${con.color}"></div><span>${con.name}</span>`;
  item.addEventListener('click', () => {
    zoom = 2; pan.x = W / 2 / zoom - con.cx * W; pan.y = H / 2 / zoom - con.cy * H; render(null);
  });
  legend.appendChild(item);
});

placeStars();
render(null);
</script>
</body>
</html>
